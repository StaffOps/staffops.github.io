site_name: StaffOps
site_description: Open source platform for DevOps, SRE and Platform Engineering teams
site_url: https://staffops.github.io/
repo_url: https://github.com/StaffOps
repo_name: StaffOps
edit_uri: ""

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Products:
      - Overview: products/index.md
      - Aigent Squad: products/aigent-squad.md
      - ChaiTops: products/chaitops.md
      - Anomaly Detection: products/anomaly-detection.md
      - Agent Definition: products/agent-definition.md
      - Helm Charts: products/helm-charts.md
  - Community:
      - Principles: community/principles.md
      - Contributing: community/contributing.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StaffOps
      name: StaffOps on GitHub
  generator: false

copyright: Copyright &copy; StaffOps Contributors — Apache 2.0
